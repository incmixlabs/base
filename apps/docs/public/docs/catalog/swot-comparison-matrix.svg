        <circle cx="28" cy="152" r="3"/><text x="42" y="157">Fast release cadence</text>
        <circle cx="28" cy="186" r="3"/><text x="42" y="191">Reusable primitives</text>
        <circle cx="28" cy="220" r="3"/><text x="42" y="225">Strong design language</text>
      </g>
