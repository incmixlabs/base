    <rect x="177" y="88" width="177" height="162" fill="#ecfeff"/>
    <rect x="354" y="88" width="177" height="162" fill="#fff7ed"/>
    <rect x="531" y="88" width="177" height="162" fill="#faf5ff"/>
    <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
