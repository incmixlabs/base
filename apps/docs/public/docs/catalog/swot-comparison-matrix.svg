        <circle cx="559" cy="152" r="3"/><text x="573" y="157">Complex templates</text>
        <circle cx="559" cy="186" r="3"/><text x="573" y="191">Dependency scope</text>
        <circle cx="559" cy="220" r="3"/><text x="573" y="225">Preview metadata</text>
