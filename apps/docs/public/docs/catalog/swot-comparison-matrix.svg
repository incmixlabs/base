<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">SWOT Comparison Matrix thumbnail</title>
  <desc id="desc">A four column SWOT comparison matrix with blue, teal, amber, and purple quadrants.</desc>
  <rect width="960" height="560" rx="36" fill="#f8fafc"/>
  <rect x="86" y="70" width="788" height="420" rx="28" fill="#ffffff" stroke="#dbe3ea" stroke-width="4"/>
  <g opacity=".45">
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#cbd5e1"/>
    </pattern>
    <rect x="114" y="102" width="732" height="360" fill="url(#dots)"/>
  </g>
  <g transform="translate(126 126)" fill="none" stroke="#334155" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
