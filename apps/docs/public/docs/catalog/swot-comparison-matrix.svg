    <text x="619" y="51" text-anchor="middle" fill="#fff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="900">T</text>
    <text x="88" y="73" text-anchor="middle" fill="#e0f2fe" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="800">STRENGTHS</text>
    <text x="265" y="73" text-anchor="middle" fill="#cffafe" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="800">WEAKNESSES</text>
    <text x="442" y="73" text-anchor="middle" fill="#ffedd5" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="800">OPPORTUNITIES</text>
